version: "3.9"

# ─── Services ──────────────────────────────────────────────────────────────────
services:

  # ── App (Next.js) ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: generative-ui-chatbot
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      # Optional LangSmith tracing
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-generative-ui-chatbot}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - app-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chatbot.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.services.chatbot.loadbalancer.server.port=3000"

  # ── Dev Server (hot-reload) ────────────────────────────────────────────────
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: generative-ui-dev
    profiles:
      - dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - WATCHPACK_POLLING=true
    networks:
      - app-net

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge
